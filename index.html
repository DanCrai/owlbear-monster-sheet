<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial;
            padding: 10px;
            color: white;
            background-color: transparent;
        }

        h2, h3 {
            margin: 5px 0;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        select {
            background: #222;
            color: white;
            border: 1px solid #555;
            padding: 3px;
        }

        .sheet {
            margin-top: 10px;
            padding: 8px;
            border: 1px solid #444;
            border-radius: 6px;
            background: rgba(0,0,0,0.3);
        }

        .ability {
            border-top: 1px solid #555;
            margin-top: 6px;
            padding-top: 6px;
        }

        .ability-name {
            font-weight: bold;
        }

        .small {
            font-size: 12px;
            color: #bbb;
        }

        .section {
            margin-top: 10px;
        }

        .section-header {
            cursor: pointer;
            font-weight: bold;
            padding: 4px;
            background: #333;
            border-radius: 4px;
        }

        .ability {
            margin-left: 8px;
            margin-bottom: 6px;
        }

        .desc {
            font-size: 12px;
            color: #ccc;
        }

        .effects {
            font-size: 12px;
        }

    </style>
</head>

<body style="display:none;">

    <div id="sheet"></div>

    <script type="module" src="main.js"></script>

</body>
</html>
